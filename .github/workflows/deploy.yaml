name: Build and Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/gobus_mcp/**"
      - "Dockerfile"
      - "pyproject.toml"
      - ".github/workflows/deploy.yaml"

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    uses: destaquesgovbr/reusable-workflows/.github/workflows/cloud-run-deploy.yml@v2
    with:
      dockerfile: Dockerfile
      ar_repository: destaquesgovbr-gobus-mcp
      image_name: gobus-mcp
      cloud_run_service: destaquesgovbr-gobus-mcp
